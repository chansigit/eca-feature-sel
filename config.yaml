# eca-feature-sel configuration
# Paths are cluster-specific; edit for your environment. cache_root MUST be on
# $SCRATCH (never $HOME) per Sherlock policy.

corpus_root: /scratch/users/chensj16/sc-curation-output     # fallback auto-discovery root
inputs_tsv:                                                 # explicit sample_key/species/h5ad lists
  - human.tsv
  - mouse.tsv
cache_root:  /scratch/users/chensj16/eca-feature-sel/cache   # all computed results (reused)
venv_python: /scratch/users/chensj16/venvs/dl2025/.venv/bin/python
ensembl_release: "112"                                        # for the biotype reference

slurm:
  partition: normal
  time: "00:20:00"
  mem: 4GB
  cpus: 1
  array_throttle: 100        # max concurrent array tasks (be nice to the scheduler)

slurm_stage2:
  partition: normal
  time: "04:00:00"
  mem: 32GB
  cpus: 4
  array_throttle: 20
  batch_size: 4              # run up to this many small datasets per array task
  batch_max_cells: 50000     # keep larger stage-2 datasets isolated; 0 disables

# Default selection policy. Everything here is overridable on the `build` CLI.
# The category rule removes selected categories after data-driven candidate selection.
selection:
  detection_rule:
    min_frac: 0.01           # gene must be detected in at least this fraction of cells
    min_dataset_occurrence: 10  # min datasets where the gene clears min_frac

  hvg_rule:
    n_top_genes: 3000        # selected independently within each dataset
    min_datasets: 1          # min datasets where the gene is selected as HVG
    layer: counts
    flavor: seurat_v3
    normalize_target_sum: 10000

  cluster_deg_rule:
    obs_key_priority: [cell_type_fine, cell_type_coarse, cell_type, cell_subtype, cluster_annotation, cluster, clusters]
    missing_obs_policy: skip_dataset
    method: wilcoxon
    one_vs_rest: true
    min_cluster_cells: 50
    min_other_cells: 50
    min_pct_in_cluster: 0.10
    min_pct_difference: 0.05
    min_log2fc: 0.25
    max_adj_pvalue: 0.05
    top_n_per_cluster: 100
    candidate_multiplier: 20
    min_datasets: 1

  category_rule: [is_pseudogene]
