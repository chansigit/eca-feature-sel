# eca-feature-sel configuration
# Paths are cluster-specific; edit for your environment. cache_root MUST be on
# $SCRATCH (never $HOME) per Sherlock policy.

corpus_root: /scratch/users/chensj16/sc-curation-output     # fallback auto-discovery root
inputs_tsv:                                                 # explicit sample_key/species/h5ad lists
  - human.tsv
  - mouse.tsv
cache_root:  /scratch/users/chensj16/eca-feature-sel/cache   # all computed results (reused)
venv_python: /scratch/users/chensj16/venvs/dl2025/.venv/bin/python
ensembl_release: "112"                                        # for the biotype reference

slurm:
  partition: normal
  time: "00:20:00"
  mem: 4GB
  cpus: 1
  array_throttle: 100        # max concurrent array tasks (be nice to the scheduler)

# Default selection policy. Everything here is overridable on the `build` CLI.
# The category rule removes selected categories after count-driven candidate selection.
select:
  f: 0.01                    # per-dataset detection floor (one of 0.005/0.01/0.02/0.05)
  k: 3                       # consistency arm: min #datasets a gene must clear f in
  strength_det: 0.25         # strength arm: per-dataset detection floor
  strength_q: 0.90           # strength arm: max_mean_expr quantile bar
  category_rule: [is_pseudogene]
